<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adaptive Tutor - Entry</title>
  <link rel="stylesheet" href="/frontend/app/styles.css" />
</head>
<body>
  <main class="app-shell entry-shell">
    <section class="app-card entry-card">
      <header class="app-header">
        <div>
          <p class="eyebrow">Adaptive Tutor</p>
          <h1>Enter your email</h1>
          <p class="subtle">We’ll check whether your profile already exists and route you to the right place.</p>
        </div>
      </header>

      <form id="entryForm" class="entry-form">
        <label class="field">
          <span>Email address</span>
          <input name="email" type="email" placeholder="name@example.com" required />
        </label>

        <div class="actions">
          <button type="submit" class="btn primary">Continue</button>
        </div>
      </form>
    </section>
  </main>

  <script src="/frontend/app/entry.js"></script>
</body>
</html>
